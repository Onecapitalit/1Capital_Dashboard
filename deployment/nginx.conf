server {
    listen 80;
    server_name demo.1capital.in;

    # Frontend - Vite Build Files
    location / {
        root /var/www/OneCapitalSalesDashboard/frontend/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Django Backend API & Admin
    location ~ ^/(api|admin|dashboard|accounts) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_redirect off;
    }

    # Django Static Files (Admin assets)
    location /static/ {
        alias /var/www/OneCapitalSalesDashboard/SalesDashboard/staticfiles/;
    }

    # Data Files (Media)
    location /data/ {
        alias /var/www/OneCapitalSalesDashboard/data_files/;
    }

    # Increase client body size for file uploads
    client_max_body_size 10M;
}
