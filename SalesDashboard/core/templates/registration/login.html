<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Business Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-2xl">
        <!-- OneCapital Logo & Branding -->
        <div class="text-center mb-6">
            <svg class="w-12 h-12 mx-auto mb-2" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect width="40" height="40" rx="8" fill="#1e3a8a"/>
                <circle cx="12" cy="20" r="4" fill="white"/>
                <path d="M20 16 L24 20 L20 24 L16 20 Z" fill="white"/>
                <path d="M28 16 L32 20 L28 24 L24 20 Z" fill="#93c5fd"/>
            </svg>
            <h1 class="text-lg font-bold text-gray-900">1capital.in</h1>
            <p class="text-xs text-gray-500">Business Dashboard</p>
        </div>
        
        <h2 class="text-3xl font-extrabold text-gray-900 text-center">
            Sign in
        </h2>
        
        {% if form.errors %}
            <div class="p-3 text-sm text-red-700 bg-red-100 rounded-lg" role="alert">
                Your username and password didn't match. Please try again.
            </div>
        {% endif %}

        <form method="post" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="{{ form.username.id_for_label }}" class="block text-sm font-medium text-gray-700">Username</label>
                <div class="mt-1">
                    <input
                        id="{{ form.username.id_for_label }}"
                        name="{{ form.username.html_name }}"
                        type="text"
                        autocomplete="username" 
                        required
                        class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    >
                </div>
            </div>

            <div>
                <label for="{{ form.password.id_for_label }}" class="block text-sm font-medium text-gray-700">Password</label>
                <div class="mt-1">
                    <input
                        id="{{ form.password.id_for_label }}"
                        name="{{ form.password.html_name }}" 
                        type="password"
                        autocomplete="current-password"
                        required
                        class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                    >
                </div>
            </div>

            <div class="pt-4">
                <button
                    type="submit"
                    class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
                >
                    Sign in
                </button>
            </div>

            {% if next %}
                <input type="hidden" name="next" value="{{ next }}" />
            {% endif %}
        </form>
    </div>

</body>
</html>
